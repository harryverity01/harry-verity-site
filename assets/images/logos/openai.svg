<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="#000">
  <!-- OpenAI hexagon knot symbol -->
  <g transform="translate(36, 40)" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer hexagon -->
    <path d="M0,-24 L20.8,-12 L20.8,12 L0,24 L-20.8,12 L-20.8,-12 Z"/>
    <!-- Spokes from outer to inner -->
    <line x1="0" y1="-24" x2="0" y2="-12"/>
    <line x1="20.8" y1="-12" x2="10.4" y2="-6"/>
    <line x1="20.8" y1="12" x2="10.4" y2="6"/>
    <line x1="0" y1="24" x2="0" y2="12"/>
    <line x1="-20.8" y1="12" x2="-10.4" y2="6"/>
    <line x1="-20.8" y1="-12" x2="-10.4" y2="-6"/>
    <!-- Inner hexagon -->
    <path d="M0,-12 L10.4,-6 L10.4,6 L0,12 L-10.4,6 L-10.4,-6 Z"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="54" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-1" fill="#000">OpenAI</text>
</svg>